single_shot_instructions: |
  Classify each source unit in an unlabeled English client-developer
  conversation using one LLM call. The code will convert these decisions into a
  traceable software specification draft.

  The output should include:
  - a short project summary
  - one or more flat source_unit_decision rows per relevant conversation unit
  - repeated source_unit values when one source unit contains multiple atomic decisions

  Do not generate final requirements, evidence spans, acceptance criteria,
  quality checks, or verification fields. Use the provided conversation_units as
  the only evidence base.
